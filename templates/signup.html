{% extends "base.html" %}
{% block title %}Sign up — Axiom{% endblock %}

{% block content %}
<section class="auth-section">
  <div class="wrap auth-wrap">
    <div class="auth-card">
      <p class="eyebrow">Free, forever</p>
      <h2>Create your account</h2>
      <p class="muted">Starts on the Free tier. Upgrade any time from Pricing.</p>
      <form method="POST" action="{{ url_for('signup') }}">
        <div class="field">
          <label for="signup-name">Name</label>
          <input type="text" id="signup-name" name="name" placeholder="Your name" required>
        </div>
        <div class="field">
          <label for="signup-email">Email</label>
          <input type="email" id="signup-email" name="email" placeholder="you@example.com" required>
        </div>
        <div class="field">
          <label for="signup-pass">Password</label>
          <input type="password" id="signup-pass" name="password" placeholder="Create a password" required minlength="6">
        </div>
        <button class="btn btn-solid btn-block" type="submit">Create account</button>
      </form>
      <p class="auth-foot">Already a member? <a href="{{ url_for('login') }}">Log in</a></p>
    </div>
  </div>
</section>
{% endblock %}
