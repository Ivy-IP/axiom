{% extends "base.html" %}
{% block title %}Log in — Axiom{% endblock %}

{% block content %}
<section class="auth-section">
  <div class="wrap auth-wrap">
    <div class="auth-card">
      <p class="eyebrow">Welcome back</p>
      <h2>Log in</h2>
      <form method="POST" action="{{ url_for('login') }}">
        <div class="field">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" name="email" placeholder="you@example.com" required>
        </div>
        <div class="field">
          <label for="login-pass">
            Password
            <a href="{{ url_for('forgot_password') }}" class="forgot-link">Forgot password?</a>
          </label>
          <input type="password" id="login-pass" name="password" placeholder="••••••••" required>
        </div>
        <button class="btn btn-solid btn-block" type="submit">Log in</button>
      </form>
      <p class="auth-foot">New here? <a href="{{ url_for('signup') }}">Create an account</a></p>
    </div>
  </div>
</section>
{% endblock %}
